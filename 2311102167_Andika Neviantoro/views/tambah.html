<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SportZone — Tambah Produk</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet"/>
  <link href="/css/style.css" rel="stylesheet"/>
</head>
<body>

<div id="navbar"></div>

<!-- Page Header -->
<div class="page-header" data-bg="TAMBAH">
  <h1>Tambah Produk</h1>
  <p><i class="fa fa-plus-circle me-1"></i> Isi form di bawah untuk menambahkan produk baru ke inventaris</p>
</div>

<div class="container py-4" style="max-width:680px;">
  <div class="sz-card">
    <div class="sz-card-header">
      <div class="icon"><i class="fa fa-box-open"></i></div>
      <h2>Form Produk Baru</h2>
    </div>
    <div class="sz-card-body">

      <div id="alertBox"></div>

      <div class="mb-3">
        <label class="form-label">Nama Produk <span style="color:var(--accent)">*</span></label>
        <input type="text" id="inputNama" class="form-control"
               placeholder="cth. Nike Air Zoom Pegasus 40"/>
      </div>

      <div class="mb-3">
        <label class="form-label">Kategori <span style="color:var(--accent)">*</span></label>
        <select id="inputKategori" class="form-select">
          <option value="">— Pilih Kategori —</option>
          <option value="Sepatu">Sepatu</option>
          <option value="Pakaian">Pakaian</option>
          <option value="Perlengkapan">Perlengkapan</option>
          <option value="Aksesoris">Aksesoris</option>
          <option value="Lainnya">Lainnya</option>
        </select>
      </div>

      <div class="row g-3 mb-4">
        <div class="col-7">
          <label class="form-label">Harga (Rp) <span style="color:var(--accent)">*</span></label>
          <div class="input-group">
            <span class="input-group-text">Rp</span>
            <input type="number" id="inputHarga" class="form-control"
                   placeholder="0" min="0"/>
          </div>
        </div>
        <div class="col-5">
          <label class="form-label">Stok <span style="color:var(--accent)">*</span></label>
          <input type="number" id="inputStok" class="form-control"
                 placeholder="0" min="0"/>
        </div>
      </div>

      <div class="d-flex gap-2">
        <button class="btn-sz flex-grow-1" id="btnSimpan">
          <i class="fa fa-floppy-disk"></i> Simpan Produk
        </button>
        <a href="/" class="btn-sz-outline text-decoration-none">
          <i class="fa fa-arrow-left"></i> Batal
        </a>
      </div>

    </div>
  </div>
</div>

<div id="toastZone" class="toast-zone"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
<script src="/js/shared.js"></script>
<script>
  renderNavbar('/tambah');

  $('#btnSimpan').on('click', function () {
    const nama     = $('#inputNama').val().trim();
    const kategori = $('#inputKategori').val();
    const harga    = $('#inputHarga').val();
    const stok     = $('#inputStok').val();

    // Validasi
    if (!nama || !kategori || !harga || !stok) {
      $('#alertBox').html(`
        <div class="alert alert-danger d-flex align-items-center gap-2 mb-3" style="background:rgba(255,77,0,.1);border:1px solid rgba(255,77,0,.3);color:var(--accent);border-radius:10px;">
          <i class="fa fa-triangle-exclamation"></i>
          <span>Semua field wajib diisi!</span>
        </div>`);
      return;
    }
    $('#alertBox').html('');

    // Kirim POST ke API
    $.ajax({
      url: '/api/products',
      type: 'POST',
      contentType: 'application/json',
      data: JSON.stringify({ nama, kategori, harga: parseInt(harga), stok: parseInt(stok) }),
      success: function (res) {
        showToast(`"${res.data.nama}" berhasil ditambahkan!`, 'success');
        setTimeout(() => window.location.href = '/', 1200);
      },
      error: function (xhr) {
        const msg = xhr.responseJSON?.error || 'Gagal menyimpan produk.';
        showToast(msg, 'error');
      }
    });
  });

  // Enter key shortcut
  $(document).on('keydown', 'input, select', function (e) {
    if (e.key === 'Enter') $('#btnSimpan').click();
  });
</script>
</body>
</html>
