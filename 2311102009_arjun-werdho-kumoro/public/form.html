<!DOCTYPE html>
<html>
<head>
<title>Form Buah</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>

</head>

<body class="bg-light">

<div class="container mt-4">

<h3 class="text-success">Input Buah</h3>

<form id="form">

<input type="hidden" id="id">

<div class="mb-3">
<input type="text" id="nama" class="form-control" placeholder="Nama buah" required>
</div>

<div class="mb-3">
<select id="kategori" class="form-control">
<option>Buah Lokal</option>
<option>Buah Import</option>
</select>
</div>

<div class="mb-3">
<input type="number" id="harga" class="form-control" placeholder="Harga" required>
</div>

<button class="btn btn-success">Simpan</button>

<a href="index.html" class="btn btn-secondary">Kembali</a>

</form>

</div>

<script>

let params = new URLSearchParams(window.location.search);
let id = params.get('id');

if(id){
    fetch('/api/buah')
    .then(res=>res.json())
    .then(data=>{
        let d = data.find(x=>x.id==id);
        $('#id').val(d.id);
        $('#nama').val(d.nama);
        $('#kategori').val(d.kategori);
        $('#harga').val(d.harga);
    });
}

$('#form').submit(function(e){
    e.preventDefault();

    let data = {
        nama:$('#nama').val(),
        kategori:$('#kategori').val(),
        harga:$('#harga').val()
    };

    if(id){
        fetch('/api/buah/'+id,{
            method:'PUT',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify(data)
        }).then(()=>window.location='index.html');
    }else{
        fetch('/api/buah',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify(data)
        }).then(()=>window.location='index.html');
    }
});

</script>

</body>
</html>
